[package]
name = "vihaanaitech-api"
version = "0.1.0"
edition = "2024"

[dependencies]
axum = "0.8.8"
tokio = { version = "1.36", features = ["full"] }
serde = { version = "1.0", features = ["derive"] }
serde_json = "1.0"
sqlx = { version = "0.7", features = ["mysql", "runtime-tokio-native-tls"] }
dotenvy = "0.15"
jsonwebtoken = "10.2.0"
argon2 = "0.5"
thiserror = "1"
tracing = "0.1"
tracing-subscriber = "0.3"
